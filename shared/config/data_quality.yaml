# Data Quality Engine — Phase 9 (Profitability Restoration § 9.1)
# ─────────────────────────────────────────────────────────────────
# Real RPC-backed scam detector configuration.
# Closes GAP-01 from docs/analysis/profitability-gaps.md.
# All values tunable per chain via config/chains.yaml `data_quality` block (additive override).
# No hardcoded values in module code (per copilot-instructions § 0.5).
# ─────────────────────────────────────────────────────────────────

data_quality:
  # ── Per-detector timeouts ─────────────────────────────────────
  # Hard ceiling per detector RPC call. Exceeded → Indeterminate (risky-pass).
  detector_timeout_ms: 800

  # ── Detector enable flags ─────────────────────────────────────
  # Disabled detectors are skipped entirely (cost-saving for non-applicable chains).
  detectors:
    honeypot_simulation: false # EVM-only (eth_call buy→sell) — not applicable to Solana; re-enable when EVM chains are added
    tax_anomaly: true # decode Transfer logs in simulated tx
    lp_lock: true # Unicrypt / Team Finance / PinkLock
    wash_trading: true # unique-sender ratio over recent Swaps
    rug_authority: true # ABI selectors (EVM) / mint authority (Solana)
    contract_verified: false # EVM-only (Etherscan/BscScan) — not applicable to Solana; re-enable when EVM chains are added
    # dev_reputation: serial-launcher + no-social-links filter.
    # Requires solana_creator_reputation probe to populate
    # CreatorPrevTokenCount / SocialLinksKnown on MarketDataDTO.
    # Enabled in all modes; degrades to Unknown when probe not yet run.
    dev_reputation: true
    # name_duplicate: structural reject for tokens whose normalized name
    # (lowercase, trimmed) has already been ingested for the same chain.
    # Flag is set by the MarketProbesWorker pre-probe guard — no Helius
    # credits consumed. Saves ~1-2 credits per duplicate token launch.
    name_duplicate: true
    # copycat_name: structural reject for tokens whose name matches a
    # famous/established token in the name_dedup.known_tokens list below.
    # Flag is set by the MarketProbesWorker before any RPC probe runs.
    copycat_name: true
    # ai_copy_paste_desc: hard reject when the AI narrative probe returns
    # NarrativeKnown=true and detects a copy-paste / boilerplate description.
    # Fail-open: if the AI probe fails (NarrativeKnown=false), no rejection.
    ai_copy_paste_desc: true
    # ai_impersonation: hard reject when the AI narrative probe returns
    # NarrativeKnown=true and detects name/symbol impersonation of a known project.
    # Fail-open: if the AI probe fails (NarrativeKnown=false), no rejection.
    ai_impersonation: true

  # ── Detector thresholds ───────────────────────────────────────
  thresholds:
    # Honeypot — max acceptable received/sent ratio deviation
    honeypot_ratio_deviation_max: 0.30

    # Tax anomaly — total tax ceiling in basis points (10% = 1000 bps)
    tax_total_max_bps: 1000
    tax_buy_max_bps: 800
    tax_sell_max_bps: 1000

    # Wash trading — minimum unique-sender ratio over recent Swap window
    wash_unique_ratio_min: 0.30
    wash_recent_swaps_window: 20

    # LP lock — minimum lock duration in days
    lp_lock_required: true
    lp_lock_min_days: 30

    # Phase 10 (Reference-Repo Improvements / Task F) — Solana bonding
    # curve progress filter. Reject MarketDataDTO when
    # BondingCurveProgressBps > this cap (0..10000 = 0..100%).
    # Set to 0 to disable (default — EVM events always carry 0).
    max_bonding_curve_progress_bps: 0

    # Minimum liquidity (USD) to consider a token not thin/fake.
    # EVM default: 5000. For PumpFun Solana markets the 30 SOL protocol
    # virtual reserve at creation is ~$3000-6000 depending on SOL price;
    # setting this below that floor avoids a false LOW_LIQUIDITY flag on
    # every new PumpFun launch. 0 disables the check entirely.
    min_liquidity_usd: 3000.0

    # Maximum total token supply. Tokens with supply > this value are
    # immediately rejected — excessive supply destroys scarcity and is
    # a strong indicator of low-value/rug meme tokens (e.g. Q10D: 2B supply).
    # Only applied when MarketDataDTO.TotalSupplyKnown=true.
    # 0 disables the check entirely.
    max_total_supply: 1000000000 # 1 billion

    # Dev reputation thresholds (requires dev_reputation detector).
    #
    # max_creator_prev_token_count: reject contribution rises when the creator
    # wallet has launched this many prior tokens. The $RIBBIT pattern
    # (29 launches, 0 migrations) gives full serial-launcher risk.
    # 0 disables; canonical default: 1.
    max_creator_prev_token_count: 1

    # no_social_links_risk_score: fixed risk contribution [0,1] when
    # SocialLinksKnown=true and HasSocialLinks=false. Set to 0 to disable.
    # Combined with serial-launcher signal this will push most pump-and-dump
    # tokens over the REJECT threshold. Alone it is a soft signal only.
    no_social_links_risk_score: 0.40

    # reject_unknown_total_supply: when true, a token whose TotalSupplyKnown=false
    # is structurally rejected when max_total_supply > 0. This closes the
    # LP-probe failure gap — if the probe is unhealthy the token is rejected
    # (fail-closed) rather than silently passing with an unchecked supply.
    # Set to false only on chains where supply is legitimately not fetchable
    # (or set max_total_supply: 0 to disable the supply check entirely).
    # MANDATORY criterion — must not be disabled in production.
    reject_unknown_total_supply: true

    # reject_no_social_links: when true, a confirmed absence of social links
    # (SocialLinksKnown=true AND HasSocialLinks=false) becomes a structural
    # hard-reject. Social links must represent real profile pages (Twitter/X
    # profile, Telegram channel, or real project website) — not DEX pages,
    # scanner links, or pump.fun launcher URLs.
    # MANDATORY criterion — must not be disabled in production.
    reject_no_social_links: true

    # reject_unknown_social_links: when true, SocialLinksKnown=false (metadata
    # probe timed out, fetch error, or probe disabled) is a structural hard-reject.
    # Closes the probe-failure gap: a token whose social presence cannot be
    # verified is treated the same as a token with no social links.
    # MANDATORY criterion — must not be disabled in production.
    reject_unknown_social_links: true

    # reject_unknown_creator_count: when true, CreatorPrevTokenCountKnown=false
    # (creator reputation probe timed out, API error, or not run) is a structural
    # hard-reject when max_creator_prev_token_count > 0. Closes the probe-failure
    # gap: a creator whose launch history cannot be verified must be assumed to be
    # a serial launcher. Without this, a 300ms RPC timeout converts a 29-token
    # serial rug developer into an approved first-timer.
    # MANDATORY criterion — must not be disabled in production.
    # NOTE: the solana_creator_reputation probe calls frontend-api.pump.fun behind
    # Cloudflare. Browser-compatible headers (User-Agent, Origin, Referer) are set
    # on every request to prevent HTTP 530 bot-block responses. If 530s persist,
    # increase probes.solana_creator_reputation.timeout_ms in pipeline.yaml or
    # wire an alternative creator history source (e.g. Helius searchAssets).
    reject_unknown_creator_count: true

    # min_token_age_seconds: hard-reject tokens younger than this threshold.
    # Tokens under this age have incomplete data — holder distribution is not
    # settled, wash patterns are not yet visible, and metadata probes may not
    # have propagated. The rescan pipeline re-evaluates the token once it is
    # old enough. Age measured from BlockTimestamp (on-chain creation time),
    # falling back to IngestedAt. 0 disables.
    # Reference token: $LOL (34q2Km…sWYb) — created Mar 2026, migrated to
    # CEX within hours. Quality profile: social links present, dev 1/1 tokens,
    # LP burned, contract renounced. 15 minutes gives enough time for holder
    # distribution and wash patterns to become observable.
    #
    # P2-B Review (Task 20 — 2026-05-29, PRODUCTION_GATE_ANALYSIS § 7 P2-B):
    # pump.fun graduation tokens (pumpfun-amm family) have newly-created Raydium
    # pools immediately after bonding-curve completion. Under STRICT/BALANCED the
    # 900s floor may reject the first 15 minutes of a graduation token's lifecycle.
    # EXPLORATION/VERY_EXPLORATION already disable this check (min_token_age_seconds: -1
    # in the per-mode profile). Shadow-mode data will reveal whether graduation
    # tokens consistently peak within 3–5 minutes of listing. If yes, a follow-up
    # plan will add a per-family min_token_age_seconds override for pumpfun-amm.
    # Action deferred: PRODUCTION_GATE_ANALYSIS § 10 explicitly defers this to a
    # separate plan after ≥ 14 days AND ≥ 30 completed shadow trades. Do NOT lower
    # this value or add a per-family override until that data is available.
    min_token_age_seconds: 900 # 15 minutes — see P2-B review comment above

    # min_holder_count: structural hard-reject when confirmed unique holder
    # count is below this floor. A token with fewer than 50 holders after
    # launch is either entirely dev-owned (like COOKING with 1 holder) or has
    # no real community traction. Skipped automatically for brand-new launches
    # (PumpFunCreate events) to avoid false rejections at creation time.
    # Canonical values: STRICT=100, BALANCED=50, EXPLORATION=10.
    # 0 disables the check entirely.
    min_holder_count: 50

    # reject_unknown_holder_count: when true, HolderDistKnown=false (holder
    # distribution probe timed out or not run) is a structural hard-reject when
    # min_holder_count > 0. Does NOT apply to brand-new launches.
    # Set false initially until probe reliability is confirmed in production;
    # flip to true once the solana_holder_dist probe has a stable track record.
    reject_unknown_holder_count: true

    # ai_copy_paste_desc_min_narrative_score: minimum NarrativeScore (0–10)
    # required to save a copy-paste description from rejection. When the AI
    # probe returns NarrativeKnown=true and IsCopyPasteDesc=true, the token
    # is only rejected if its NarrativeScore is BELOW this value.
    # A copy-paste description with a strong narrative (e.g. genuine meme
    # alignment, trending topic, compelling lore) scores ≥6 and passes.
    # Boilerplate with no real story scores <6 and is rejected.
    # Range: 0–10. Default (0 here → 6.0 built-in). Raise to tighten.
    ai_copy_paste_desc_min_narrative_score: 6.0

    # Rug authority (EVM) — flag mint/pause/blacklist in unverified contracts
    rug_dangerous_selectors:
      - "mint"
      - "pause"
      - "blacklist"
      - "setMaxTx"

    # Rug authority (Solana) — must be renounced for safe pass
    solana_require_mint_authority_renounced: true
    solana_require_freeze_authority_renounced: true

    # Market cap range filter (DEXScreener data).
    # Only applied when MarketCapUsd > 0 (i.e., pair is indexed on DEXScreener).
    # Commented out by default — enable and tune after confirming graduation token
    # market cap distribution in shadow mode.
    # PRODUCTION_GATE_ANALYSIS § 10 Change 3 — guard pattern:
    #   if MinMarketCapUsd > 0 && in.MarketCapUsd > 0 && in.MarketCapUsd < MinMarketCapUsd { reject }
    # pump.fun graduation tokens transition at ~$69k market cap; the $20k max would
    # reject freshly-graduated tokens. Tune in shadow mode before enabling.
    # min_market_cap_usd: 3000.0
    # max_market_cap_usd: 20000.0
    min_market_cap_usd: 70000.0
    # max_market_cap_usd kept commented — graduation tokens at ~$69k would be rejected

    # Volume floor (DEXScreener data).
    # Only applied when VolumeUsd1h > 0.
    # PRODUCTION_GATE_ANALYSIS § 10 Change 3 — guard pattern:
    #   if MinVolumeUsd1h > 0 && in.VolumeUsd1h > 0 && in.VolumeUsd1h < MinVolumeUsd1h { reject }
    # min_volume_usd_1h: 100.0
    min_volume_usd_1h: 100.0

  # ── Detector cache (LRU) ──────────────────────────────────────
  # Keyed by (chain, token_address, detector_name). Bounded.
  cache:
    max_entries: 50000
    honeypot_ttl_sec: 600
    tax_anomaly_ttl_sec: 600
    lp_lock_ttl_sec: 300
    wash_trading_ttl_sec: 60
    rug_authority_ttl_sec: 1800
    contract_verified_ttl_sec: 3600

  # ── Risk score aggregation weights ────────────────────────────
  # Weighted sum → RiskScore ∈ [0, 1]. All weights additive; sum normalized.
  risk_weights:
    honeypot: 0.30
    tax_anomaly: 0.20
    rug_authority: 0.20
    lp_lock_missing: 0.15
    wash_trading: 0.10
    contract_unverified: 0.05
    # dev_reputation: serial-launcher + no-social-links combined weight.
    # 0.25 is meaningful (higher than wash_trading) — a dev who has launched
    # 5+ tokens with 0 migrations is a strong negative signal.
    dev_reputation: 0.25

  # ── Failure handling ──────────────────────────────────────────
  failure_policy:
    # On RPC timeout, treat detector as Indeterminate. Indeterminate flags
    # contribute to RiskScore as if positive (risky-pass), never as safe.
    indeterminate_as_positive: true
    # If ≥ this many detectors are Indeterminate, reject DQ entirely.
    max_indeterminate_count: 3

  # ── Operational-mode decision profiles (Layer 1 fix) ──────────
  # Threshold band applied to the aggregated RiskScore in [0,1] depending
  # on the active operational mode reported by SystemState.Mode.
  # Canonical values from `.github/skills/data-quality-engine/SKILL.md`.
  # `unknown_factor` controls how a `dq_unknown_<detector>` flag
  # (upstream input missing) degrades the risk score:
  #   STRICT       → 0.5  (treat unknown as half-weight risk)
  #   BALANCED     → 0.0  (neutral — wait for real data)
  #   EXPLORATION  → 0.0  (ignore — accept incomplete telemetry)
  # `min_token_age_seconds` per-mode override:
  #   0  = use global thresholds.min_token_age_seconds
  #  -1  = disable age check for this mode (new-launch sniping — EXPLORATION/VERY_EXPLORATION)
  #  >0  = mode-specific minimum age floor in seconds
  mode_profiles:
    strict:
      reject_above: 0.30
      risky_pass_above: 0.15
      unknown_factor: 0.5
      min_token_age_seconds: 0 # use global (900s)
      # Serial-launcher per-mode overrides (Phase 3 — Section 9 Step 2).
      # STRICT: sentinel 0 = use global threshold (1); behaviour unchanged.
      max_creator_prev_token_count: 0
      serial_launcher_requires_social_links: false
      serial_launcher_max_risk_score: 0.0
      serial_launcher_min_holder_count: 0
    balanced:
      reject_above: 0.50
      risky_pass_above: 0.25
      unknown_factor: 0.35 # was 0.0 — unknown detectors now contribute risk (profit-first)
      min_token_age_seconds: 0 # use global (900s)
      # Serial-launcher per-mode overrides (Phase 3 — Section 9 Step 2).
      # BALANCED: sentinel 0 = use global threshold (1); behaviour unchanged.
      max_creator_prev_token_count: 0
      serial_launcher_requires_social_links: false
      serial_launcher_max_risk_score: 0.0
      serial_launcher_min_holder_count: 0
    exploration:
      reject_above: 0.65
      risky_pass_above: 0.35
      unknown_factor: 0.0
      min_token_age_seconds: -1 # disabled — new-launch sniping catches tokens at creation
      # Serial-launcher per-mode overrides (Phase 3 — Section 9 Step 2).
      # EXPLORATION: serial launchers up to 5 prior tokens may pass via RISKY_PASS
      # when all quality gates pass; otherwise SKIP (silent drop, no event).
      max_creator_prev_token_count: 5
      serial_launcher_requires_social_links: true
      serial_launcher_max_risk_score: 0.40
      serial_launcher_min_holder_count: 50
    very_exploration:
      reject_above: 0.75
      risky_pass_above: 0.45
      unknown_factor: 0.0
      min_token_age_seconds: -1 # disabled — maximally permissive, age is irrelevant
      # Serial-launcher per-mode overrides (Phase 3 — Section 9 Step 2).
      # VERY_EXPLORATION: serial launchers up to 10 prior tokens may pass via
      # RISKY_PASS when all quality gates pass; otherwise SKIP. Looser holder
      # floor (25 vs 50) and slightly higher risk-score ceiling (0.45 vs 0.40).
      max_creator_prev_token_count: 10
      # Task 28 (2026-06-01): HOTFIX reverted after Task 26 fallback restored
      # HolderDistKnown coverage to ≥90%. Final values calibrated from shadow
      # data: social-links gate re-enabled (requires_social_links: true) and
      # holder-count floor restored to 25 (canonical VERY_EXPLORATION value per
      # §7.9). Task 22 relaxation (false/0) was live 2026-05-31→2026-06-01 with
      # no critical issues; Task 26 fallback probe (getTokenSupply +
      # getProgramAccounts) shipped 2026-06-01 and is expected to resolve
      # ≥90% of getTokenLargestAccounts timeouts on fresh pump.fun mints.
      # Revert to Task 22 relaxation values (false/0) if FN spike is observed
      # after this change: flip serial_launcher_requires_social_links: false
      # and serial_launcher_min_holder_count: 0 and restart the bot.
      # See PRODUCTION_GATE_ANALYSIS §7.18 (gate-review hotfix rationale).
      serial_launcher_requires_social_links: true
      serial_launcher_max_risk_score: 0.45
      serial_launcher_min_holder_count: 25
      shadow_pipeline_proof: true
      serial_launcher_momentum_override:
        enabled: false
        min_holder_count: 100
        min_liquidity_usd: 10000
        max_top5_holder_pct: 0.60
        require_authorities_renounced: true
        require_narrative: false
        min_narrative_score: 6.0
        max_risk_score: 0.45

  # ── Etherscan / BscScan v2 API ────────────────────────────────
  contract_verified_api:
    eth_url: "https://api.etherscan.io/v2/api"
    bsc_url: "https://api.bscscan.com/v2/api"
    rate_limit_per_sec: 5
    request_timeout_ms: 1500

  # ── Historical Thresholds (Approach B — per-cohort DQ floors) ─
  # Cohort-aware liquidity floors consumed by Layer 1 (DQ engine).
  # When a token's CohortKey matches an entry here, the cohort floor
  # overrides data_quality.thresholds.min_liquidity_usd for that token.
  # Falls back to the global min_liquidity_usd when the key is absent.
  # Populated by the `hydrate` CLI from config/historical_seeds.yaml.
  historical_thresholds:
    enabled: true
    cohort_liquidity_floors:
      tier1_legendary: 500000.0
      tier2_high_virality: 100000.0
      tier3_pumpfun_era: 10000.0
      tier4_ai_meme: 5000.0
      tier5_animal_meta: 3000.0
      tier6_degen_culture: 2000.0
      tier7_social_community: 1000.0
      tier8_meme_infra_adjacent: 1000.0
      tier9_ultra_viral_short: 500.0
      tier10_historical_early: 500.0
    buy_sell_ratio_healthy_min: 1.2
    tier9_time_to_rug_p10_sec: 180

  # ── External providers (P1 — rugcheck.xyz / social / LP intel) ───────
  # Providers augment the internal detectors with external data sources.
  # All providers boot disabled + shadow_mode: true — flip enabled: true
  # and shadow_mode: false only after shadow validation shows no FP regression.
  providers:
    enabled: false
    shadow_mode: true
    # Fraction [0, 1] of the final RiskScore supplied by external providers
    # when shadow_mode is false. 0.20 = 20% external, 80% internal detectors.
    external_weight: 0.20
    # Shared wall-clock deadline for all provider calls in one pipeline tick.
    budget_ms: 300
    rugcheck:
      # rugcheck.xyz — free public API, Solana-only (EVM tokens are skipped).
      enabled: true
      shadow_mode: true # record flags/score but never affect pipeline decision
      weight: 1.0 # sole active provider → full external_weight allocated
    social_gate:
      # P2: Twitter/X social gate via DEXScreener public API (no key required).
      # Scores: has_twitter=0.10, has_other_social=0.30, no_socials=0.50
      enabled: false # flip to true after shadow validation
      shadow_mode: true # boot in shadow until score distribution validated
      weight: 0.5 # ~33% of external weight when both rugcheck + social active
    birdeye:
      # P3: BirdEye token security — creator risk, holder concentration, LP lock.
      # API key is read from env BIRDEYE_API_KEY at runtime — never stored here.
      enabled: false # flip to true after BIRDEYE_API_KEY is set
      shadow_mode: true # boot in shadow until score distribution validated
      weight: 1.0 # highest-signal provider when enabled
    copy_trade:
      # P8: Copy-trading signal amplifier — monitors a whitelist of alpha-wallet
      # addresses. When any watched wallet has traded the same token, the risk
      # score is reduced (higher confidence = lower risk contribution).
      # Wallet list is read from COPY_TRADE_WALLETS env var (comma-separated).
      # No wallet list → Degraded=true (fail-open, pipeline continues).
      enabled: false # flip to true after wallet list is configured
      shadow_mode: true # boot in shadow until signal quality is validated
      weight: 0.8 # signal boosts confidence — subtract from risk score

# ── Pre-probe name deduplication guard ────────────────────────────────────────
# Controls the MarketProbesWorker name-dedup guard that runs BEFORE any RPC probe.
# Tokens flagged here skip ALL Helius RPC calls (saving ~2 credits each).
#
# Two checks are performed (fastest first):
#   1. In-process session cache — zero-cost after the first encounter.
#   2. Copycat list lookup (below) — O(1) map lookup, zero DB cost.
#   3. DB query (CheckTokenNameSeen) — covered by idx_market_data_name_chain.
#
# The DQ layer then enforces structural rejects on IsNameDuplicate / IsCopycat
# via the name_duplicate and copycat_name detector flags above.
name_dedup:
  enabled: true
  # known_tokens: normalized names of famous/established tokens.
  # Entries are lowercased + trimmed at load time; any token whose normalized

pipeline:
  schema_version: "1"

database:
  engine: postgres
  host: localhost
  port: 5432
  database: sniper
  user: sniper
  # Password is read from SNIPER_DB_PASSWORD env var.
  # ssl_mode controls PostgreSQL TLS. Use 'require' or 'verify-full' in production.
  # Override with SNIPER_DB_SSL_MODE env var.
  ssl_mode: disable # local dev only
  pool:
    max_open_conns: 20
    max_idle_conns: 5
    conn_max_lifetime_seconds: 3600

worker:
  idle_backoff_ms: 100 # sleep when queue is empty
  max_retry_count: 3 # retries before dead-lettering an event
  panic_recovery: true # recover from handler panics

logging:
  level: info # debug | info | warn | error
  format: json # json | text

# ── Phase 2: Pipeline Stage Configuration ─────────────────────────────────────

edge:
  min_velocity_score: 0.3 # minimum tx velocity score to detect edge
  # Minimum liquidity score; 0.55 blocks cold-start tokens (z=0 → score=0.5).
  # At 15m rescan, tokens with any real SOL buys score ~=1.0 due to sigma-floor.
  # Binary behavior: only tokens with actual buyer activity pass.
  min_liquidity_score: 0.55
  max_age_seconds: 300 # token age ceiling for NEW_LAUNCH rule (5 min)
  base_window_ms: 4000 # base opportunity window in milliseconds
  window_momentum_factor: 0.5 # scales window by edge strength
  ttl_seconds: 8 # EdgeDTO TTL before expiry
  # Phase 11 (Reference-Repo R2 — DETECT/EDGE) — creator-wallet hygiene
  # gates. Set any value to 0 to DISABLE that specific gate. All three
  # are AND'd: any failure rejects the edge with the matching reason.
  max_dev_buy_pct_bps: 0 # reject if dev buys > N bps of supply at launch (0=off)
  max_creator_rug_count: 0 # reject if creator wallet has ≥N prior rugs (0=off)
  min_dev_wallet_age_seconds: 0 # reject if creator wallet age < N seconds (0=off)
  # ── F-4 fix: edge taxonomy + adaptive momentum threshold ────────────────────
  # Extended so rescan tokens (15m–1h age) still use NEW_LAUNCH_EDGE
  # instead of MOMENTUM_EDGE (which requires WashStats unavailable for pump.fun).
  new_launch_window_seconds: 7200 # pool-age ceiling for NEW_LAUNCH_EDGE (2 h)
  min_contract_safety: 0.0 # NEW_LAUNCH safety floor (defence-in-depth)
  new_launch_weight_liquidity: 0.4
  new_launch_weight_safety: 0.3
  new_launch_weight_holders: 0.2
  new_launch_weight_entropy: 0.1
  momentum_weight_price: 0.4
  momentum_weight_volume: 0.4
  momentum_weight_velocity: 0.2
  min_price_momentum: 0.4 # cold-start floor + absolute min for adaptive threshold
  min_volume_momentum: 0.3 # hard gate on VolumeMomentum for MOMENTUM_EDGE
  momentum_quantile: 0.7 # rolling-window quantile for adaptive threshold
  baseline_min_samples: 30 # below this, use MinPriceMomentum (cold start)
  baseline_max_len: 256 # per-signal ring-buffer cap
  # Residual-risk #1 — debounced rolling-window baseline persistence.
  # Hot path stays in-memory; the worker flushes dirty (market, signal)
  # entries to the DB on this cadence (best-effort; failures logged).
  baseline_flush_interval_sec: 30 # >= 5 (validator); 0 → default 30
  baseline_flush_max_writes: 100 # >= 1 (validator); excess deferred to next cycle
  model_version: edge-v1 # stamped onto EdgeDTO.EdgeModelVersionID

  # P7 — 20-slot time-series bottom detection.
  # Scores the likelihood that the current price is recovering from a
  # local V-shape bottom.  Boots in shadow_mode=true — flip to false
  # after validating score distribution against live trades.
  bottom_detection:
    enabled: true
    shadow_mode: false
    max_slots: 20
    min_score: 0.60 # gate threshold when NOT in shadow mode (0 = disabled)

validation:
  prior_probability: 0.35 # fixed prior P(success) — Phase 2 simplification
  prior_gain_bps: 3000 # expected gain on win (30%)
  prior_loss_bps: 4000 # expected loss on loss (40%)
  prior_slippage_bps: 200 # P95 slippage estimate
  ev_threshold_bps: 100 # minimum EV to ACCEPT (1%)
  fixed_costs_bps: 150 # gas + protocol fees
  build_submit_p95_ms: 500 # estimated build+submit latency overhead
  ttl_seconds: 5 # ValidatedEdgeDTO TTL before expiry
  # Phase 10 (Reference-Repo Improvements / Task D) — consecutive-pass
  # debounce gate. An edge must pass EV+latency this many times in a
  # row within the rolling window before being promoted to ACCEPT.
  # Set to 1 to disable (default behaviour).
  required_consecutive_passes: 1
  consecutive_pass_window_seconds: 60
  # Bus dependency-wait. Validation triggers on edge_event but joins
  # probability/slippage by trace_id from the DB-backed event-bus state.
  # If those upstream events have not committed by join_timeout_ms,
  # validation REJECTs with reject_reason=probability_unavailable rather
  # than silently using the prior to compute EV (that path produced the
  # mass -1900 bps reject regression — see docs/reference/architecture.md § 3.5).
  # join_poll_interval_ms is the DB poll cadence within the wait.
  join_timeout_ms: 250
  join_poll_interval_ms: 20

selection:
  # Legacy fallback when mode thresholds are unavailable. Active Top-K cap is
  # priority.modes.*.max_positions (see config/priority.yaml, PLAN Task 4).
  max_open_positions: 10
  # Micro-batch window (ms) — coalesce validated edges per chain before Top-K.
  batch_window_ms: 3000
  # 0 = use per-mode max_positions from priority.yaml.
  top_k: 0
  # Per-creator dedup gate — caps concurrent open positions per dev wallet.
  max_positions_per_creator: 2

capital:
  wallet_address: "" # EIP-55 wallet address (set via env or config)
  wallet_private_key: "" # hex private key — override with env SNIPER_WALLET_KEY
  fixed_entry_size_usd: 5.0 # override by config/capital.yaml — keep in sync
  max_total_exposure_usd: 50.0 # hard cap on total open exposure
  max_concurrent_positions: 5 # Phase 2: max 5 concurrent positions
  max_size_usd: 10.0 # single position USD ceiling
  ttl_seconds: 3 # AllocationDTO TTL before expiry

position:
  tp1_bps: 1500 # take partial at +15%
  tp2_bps: 4000 # full exit at +40%
  sl_bps: 500 # stop-loss at -5% (was 15% — tighter for micro-cap memes)
  max_hold_seconds: 300 # 5 min max hold — meme tokens pump or dump fast
  poll_interval_seconds: 5 # poll every 5s (was 15s — tighter for fast-moving tokens)

  # P6 — Dynamic trailing stop tiers.
  # Tightens the trailing floor as unrealized profit grows.
  # All tiers boot in shadow_mode: true — flip to false after shadow validation.
  dynamic_trailing:
    enabled: true
    shadow_mode: false
    # Tiers evaluated descending — first match wins.
    # trigger_bps: minimum unrealized gain (e.g. 10000 = 100% = 2x).
    # trail_bps:   trailing floor width (e.g. 2000 = 20% below peak).
    tiers:
      - trigger_bps: 40000 # 5x: trail within 10%
        trail_bps: 1000
      - trigger_bps: 20000 # 3x: trail within 15%
        trail_bps: 1500
      - trigger_bps: 10000 # 2x: trail within 20%
        trail_bps: 2000

# Phase 4 — Probability / Slippage / Latency models
models:
  latency_profile_interval_seconds: 60
  model_join_timeout_ms: 0 # 0 = fall back to priors immediately if model events not yet available

  probability:
    model_version_id: "logistic-v1"
    bias: -0.5
    w_liquidity_score: 1.5
    w_tx_velocity_score: 0.8
    w_holder_distribution: 0.6
    w_wallet_entropy: 0.4
    w_contract_safety: 1.2
    w_token_age: -0.5 # newer = riskier
    w_volume_momentum: 0.7
    w_price_momentum: 0.5
    brier_calibration: 0.18 # baseline calibration score (lower = better)

  slippage:
    # CPMM closed-form slippage model (F-3 fix). Replaces the legacy
    # bucket lookup which emitted constant (p50,p95) per liquidity tier.
    # Algorithm: see internal/modules/models/slippage.go.
    model_version_id: "cpmm-alpha-v1"
    max_slippage_bps: 5000 # hard upper bound (50%)
    volatility_z: 1.65 # standard-normal 95th-percentile multiplier
    tail_bps: 25 # fixed p95 premium so p95 > p50 even when σ≈0
    min_reserve_usd: 1.0 # numerical floor for the CPMM denominator
    default_alpha: 1.0 # used when GetSlippageAlpha errors / returns ≤0
    max_alpha: 5.0 # hard cap on the per-market α coefficient

    # Legacy bucket grid retained for YAML backward-compat only; the
    # CPMM model does NOT consult these values.
    fallback_p50_bps: 100
    fallback_p95_bps: 250
    buckets:
      - {
          liquidity_max_usd: 100000,
          size_max_usd: 100,
          p50_bps: 80,
          p95_bps: 200,
        }
      - {
          liquidity_max_usd: 100000,
          size_max_usd: 1000,
          p50_bps: 150,
          p95_bps: 400,
        }
      - {
          liquidity_max_usd: 1000000,
          size_max_usd: 100,
          p50_bps: 30,
          p95_bps: 90,
        }
      - {
          liquidity_max_usd: 1000000,
          size_max_usd: 1000,
          p50_bps: 60,
          p95_bps: 180,
        }
      - {
          liquidity_max_usd: 10000000,
          size_max_usd: 1000,
          p50_bps: 20,
          p95_bps: 60,
        }
      - {
          liquidity_max_usd: 10000000,
          size_max_usd: 10000,
          p50_bps: 50,
          p95_bps: 150,
        }

  latency:
    window_seconds: 600
    min_samples: 30
    fallback_p50_ms: 250
    fallback_p95_ms: 800

  # Phase 11 (Reference-Repo R2 — P/S/L MODELS) — congestion-aware
  # slippage uplift. When latency_p95 exceeds anchor_ms, the slippage
  # estimator multiplies p95 by (1 + excess/anchor), capped at
  # max_multiplier. Disabled when enabled=false or anchor_ms<=0.
  congestion:
    enabled: false
    latency_anchor_ms: 800
    max_multiplier: 2.0

# Live price oracle for Layer 9 position monitoring and Layer 8 shadow fills.
# on_chain: Solana tokens priced from bonding-curve / AMM vault reserves (cached RPC).
# dexscreener: DEXScreener public API for all chains (legacy default).
price_oracle:
  mode: on_chain
  cache_ttl_seconds: 5
  stale_max_multiplier: 3

execution:
  # Shadow mode enabled 2026-05-29 (Task 20 — P2-A).
  # Generates buy/sell signals and records execution_results rows with mode='shadow'
  # using a simulated fill price from the live on-chain pool oracle (PLAN Task 10).
  # No on-chain transactions are submitted; no wallet keys are loaded.
  # Gating before advancing to live: ≥ 30 completed shadow trades AND positive
  # aggregate realized_pnl_bps over the most recent 14-day window
  # (per PRODUCTION_GATE_ANALYSIS § 8 Change 6, step 13).
  # To re-enable live trading, change mode back to "live".
  mode: "shadow" # "live" | "shadow" — PRODUCTION_GATE_ANALYSIS § 7 P2-A
  # mode: "live"  # operator manual flip ONLY after shadow_gate passes (no auto-promotion)
  shadow_gate:
    min_trades: 30
    min_window_days: 14
    min_aggregate_pnl_bps: 0 # 0 = require strictly positive aggregate PnL in window
  private_route_threshold_usd: 0 # 0 disables private routing in Phase 4
  private_endpoints: []

# ── Phase 5: Learning Engine Configuration ────────────────────────────────────

learning:
  eval_window_minutes: 60 # how often the evaluator runs
  eval_window_seconds: 86400 # lookback window for evaluation (24h)
  min_sample_size: 30 # minimum records before updating
  max_delta_pct: 0.10 # max fractional change per parameter per cycle
  families:
    - thresholds
    - weights
    - cohort_mults
  shadow_window_minutes: 60 # observation window before A/B promotion
  rollback_threshold_pct: 0.10 # expectancy drop that triggers rollback
  post_promotion_watch_minutes: 120 # post-promotion monitoring window
  shadow_poll_interval_seconds: 60 # how often the shadow observer runs
  observation_window_seconds: 3600 # how long to track a rejected token's return
  fn_gain_threshold_pct: 0.10 # minimum return to classify rejected trade as FN
  rollback_check_interval_seconds: 300 # how often the rollback watchdog runs
  # F-SEC-08 / residual risk #5 — Sybil-cluster bypass tracking. Flag a
  # losing trade as a probable Sybil bypass when the wash detector said
  # the token was clean (wash_score < max_wash_score) AND the wash-stats
  # window saw more than min_wallets unique wallets.
  sybil_suspect_min_wallets: 50
  sybil_suspect_max_wash_score: 0.30
  # Phase 11 (Reference-Repo R2 — LEARN) — creator blacklist auto-build.
  # Confirmed-rug LearningRecords bump the creator's rug counter; once
  # the counter reaches min_rugs_for_blacklist, the edge gate
  # (max_creator_rug_count) starts rejecting that creator. 0 disables.
  creator_blacklist:
    enabled: false
    min_rugs_for_blacklist: 2

# ── Adaptive Risk-Appetite Controller (operational-modes skill) ───────────────
# Drives auto-transitions between STRICT / BALANCED / EXPLORATION / VERY_EXPLORATION based on
# starvation and rug/FP-rate signals. Orthogonal to the drawdown safety
# controller (config: risk.*) — the adaptive controller skips when the
# system is DEGRADED or HALTED.
mode_adaptive:
  enabled: true
  adaptive_window_sec: 1800 # 30-min look-back for rug/FP rates
  starvation_trigger_sec: 1800 # auto-upgrade after 30 min with no edges
  rug_rate_auto_downgrade: 0.15 # auto-downgrade when rug rate > 15%
  fp_rate_auto_downgrade: 0.25 # auto-downgrade when FP rate > 25%
  transition_window_sec: 3600 # at most one adaptive transition per hour
  default_startup_mode: BALANCED # cold-start mode

# ── Phase 8: Production Hardening Configuration ───────────────────────────────

hardening:
  reconciliation_interval_ms: 30000 # 30 seconds between reconciliation cycles
  reconciliation_tolerance_bps: 50 # 0.5% on-chain vs DB discrepancy tolerance
  partition_lease_ttl_sec: 60 # how long a partition lease is valid
  partition_renew_interval_sec: 30 # how often workers renew leases
  max_transient_retries: 5 # DLQ: max retries for transient errors
  max_application_retries: 3 # DLQ: max retries for application errors
  event_claim_batch_size: 10 # ClaimNextEvents batch size per call
  drain_timeout_sec: 60 # PromoteStrategyVersion drain timeout
  evaluation_deadline_sec: 3600 # seconds after execution before eval overdue
  recovery_grace_sec: 300 # seconds before marking a tx as lost
  max_reorg_depth: 12 # EVM max safe reorg depth before halt

# ── Residual Risk #3: Per-Market Slippage α Aggregator ────────────────────────
# Drives Adapter.GetSlippageAlpha — the Layer 4 CPMM slippage model
# previously returned a hardcoded α=1.0. The aggregator worker
# (workers.RunAlphaAggregator) periodically samples realized vs predicted
# slippage from execution_results × slippage_estimates × allocations and
# upserts per-market α to slippage_alpha_calibrations.

execution_quality:
  alpha:
    min_sample_count: 30 # require ≥30 fills before updating
    alpha_min: 0.5 # clamp lower bound
    alpha_max: 2.0 # clamp upper bound
    ewma_halflife_sec: 3600 # 1h EWMA halflife (recent fills win)
    update_interval_sec: 300 # 5min between aggregation cycles

# ── Residual-risk #4: optional MarketDataDTO enrichment probes ──────────────
# Default-OFF. Until simulation contracts are deployed, leave probes.enabled
# false — DQ will continue to consume the raw market_data_event and degrade
# via *Known flags per the active operational-mode profile.
probes:
  enabled: true
  # max_probes_per_hour: hard ceiling on Helius RPC HTTP probe calls per rolling
  # one-hour window. Tokens over this cap are emitted with all Known=false flags;
  # the DQ layer's fail-closed rules (reject_unknown_social_links: true, etc.)
  # safely reject them without spending any Helius credits.
  #
  # Credit ceiling at 1200/hr (Helius Developer, 10M credits/month — updated after ray_log filter):
  #   Probes (new only): 1200 × 3 credits × 720 hr/mo =  2,592,000 credits/month
  #   Probes (rescan):   rescan skips holder_dist + authorities (O2/O3 fix)
  #   Pyth:    1 credit/30s                  =     86,400 credits/month
  #   Trades:  15/day × 28 credits × 30 days =     12,600 credits/month
  #   Raydium getTransaction (ray_log filter, ~50 Initialize2/hr × 4cr):  =   1,440 credits/month
  #   Total:                                 ~  2,692,440 credits/month
  #   Budget:                                  10,000,000 credits/month
  #   Headroom:                              ~  7,300,000 credits/month (73%)
  #
  # Original 3750/hr caused 8.1M probe credits/month alone (combined with
  # unfiltered raydium-v4 getTransaction at 10 RPS = 77M credits/month total).
  # Reduce to 350 if downgrading to Helius free tier (1M credits/month).
  # Set to 0 to disable (unlimited — not recommended).
  max_probes_per_hour: 1200
  max_probe_credits_per_hour: 2400
  probe_credit_costs:
    solana_authorities: 1
    solana_pumpfun_lp: 1
    solana_holder_dist: 11
    solana_metadata: 0
    solana_creator_reputation: 0
  rate_limit_buckets:
    fresh_tokens_per_hour: 0
    rescan_tokens_per_hour: 0
  pending_queue:
    enabled: true
    drain_interval_seconds: 60
    max_attempts: 3
    ttl_hours: 24
    drain_batch_size: 50
  # batch_accounts: one getMultipleAccounts for mint + bonding curve on new
  # tokens (saves ~1 Helius credit per pump.fun probe vs two getAccountInfo).
  batch_accounts: true
  # rescan_skip_pumpfun_lp_phase2: skip solana_pumpfun_lp on 12h–48h rescan
  # bands; reserves change slowly and ingest-time LP data is sufficient.
  rescan_skip_pumpfun_lp_phase2: true
  honeypot_sim:
    enabled: false
    simulation_contract: "" # EIP-55 address of deployed sim contract
    timeout_ms: 2000 # bounded by validate_ranges to [100, 30000]
  # Solana SPL mint/freeze authority probe — sets MintAuthorityRenounced,
  # FreezeAuthorityRenounced, SolanaAuthoritiesKnown.
  solana_authorities:
    enabled: true
    timeout_ms: 1000 # increased from 300ms — Helius RPC needs headroom under load
    commitment: confirmed
  # Pump.fun bonding-curve reserve probe — replaces the virtual reserve
  # estimate with live (virtual+real) reserves and a USD liquidity figure
  # derived from the live SOL/USD feed.
  solana_pumpfun_lp:
    enabled: true
    timeout_ms: 1000 # increased from 300ms — Helius RPC needs headroom under load
    commitment: confirmed
  # SPL holder-concentration probe — sets HolderCount, Top5HolderPct,
  # HolderDistKnown via getTokenLargestAccounts.
  solana_holder_dist:
    enabled: true
    timeout_ms: 1000 # increased from 300ms — Helius RPC needs headroom under load
    commitment: confirmed
    top_k: 5
    # Fallback: when getTokenLargestAccounts times out (common in the first 60s
    # for fresh pump.fun mints), retry via getTokenSupply + getProgramAccounts.
    # Costs +11 Helius credits per fallback invocation (1 + 10). Disable here
    # if credit burn must be minimised at the cost of more HolderDistKnown=false.
    fallback_enabled: true
    fallback_timeout_ms: 2500
    fallback_max_program_accounts: 200
  # Uniswap-V2 getReserves probe — replaces ingestion-time per-swap flow
  # values with live pool depth. Default disabled until an EVM RPC client
  # is wired in cmd/server.go.
  evm_pair_reserves:
    enabled: false
    timeout_ms: 300
  # Off-chain metadata fetch probe — resolves IPFS/Arweave/HTTPS URIs for
  # Solana tokens and populates SocialLinksKnown + HasSocialLinks.
  # No RPC client required. Enabled by default — latency is acceptable for
  # first-launch scans and social-link presence is a required DQ signal.
  solana_metadata:
    enabled: true
    timeout_ms: 3000
    ipfs_gateway: "https://cloudflare-ipfs.com/ipfs/"
    max_body_bytes: 65536 # 64 KiB

  # Creator reputation probe — queries pump.fun public API to get the
  # ground-truth count of tokens ever launched from a Solana creator wallet.
  # Closes the cold-start serial-launcher gap (BLOCKER-2): local DB always
  # returns 0 on first boot, masking a developer's full launch history.
  # Enabled by default. On API/probe failure the system fails closed: DQ
  # records unknown creator history (DEV_UNKNOWN_HISTORY), and the token
  # may also be structurally hard-rejected (unknown_creator_count) when
  # `reject_unknown_creator_count` is enabled in data_quality.yaml.
  solana_creator_reputation:
    enabled: true
    timeout_ms: 5000 # increased from 3000ms — allows pump.fun + Helius DAS fallback
    base_url: "https://frontend-api-v3.pump.fun"
    max_body_bytes: 131072 # 128 KiB
    page_limit: 50

# Phase 10 — time-banded rescan worker (Layer 0.5).
# Enabled by default for Phase 10+ pipelines.
# See docs/plans/2026-06-10-profit-restoration-plan.md for full design rationale.
rescan:
  enabled: true
  interval_seconds: 60
  max_per_band_per_tick: 10
  skip_open_positions: true
  include_skipped_for_retry: false
  eligibility:
    max_honeypot_score: 0.5
    max_rug_score: 0.65
    max_buy_tax_bps: 3000
    include_passed: true
  bands:
    # ── Phase 1: Early dense (Goal A — organic momentum, 0-8h) ──────────────
    - name: "15m"
      min_age_seconds: 900
      max_age_seconds: 1800
      priority: 80
    - name: "30m"
      min_age_seconds: 1800
      max_age_seconds: 2700
      priority: 60
    - name: "45m"
      min_age_seconds: 2700
      max_age_seconds: 3600
      priority: 40
    - name: "1h"
      min_age_seconds: 3600
      max_age_seconds: 5400
      priority: 30
    - name: "1.5h"
      min_age_seconds: 5400
      max_age_seconds: 7200
      priority: 28
    - name: "2h"
      min_age_seconds: 7200
      max_age_seconds: 10800
      priority: 26
    - name: "3h"
      min_age_seconds: 10800
      max_age_seconds: 14400
      priority: 24
    - name: "4h"
      min_age_seconds: 14400
      max_age_seconds: 21600
      priority: 22
    - name: "6h"
      min_age_seconds: 21600
      max_age_seconds: 28800
      priority: 20
    - name: "8h"
      min_age_seconds: 28800
      max_age_seconds: 43200
      priority: 18
    # ── Phase 2: Recovery checkpoints (Goal B+C — reversal + CEX catalyst) ──
    - name: "12h"
      min_age_seconds: 43200
      max_age_seconds: 86400
      priority: 16
    - name: "24h"
      min_age_seconds: 86400
      max_age_seconds: 129600
      priority: 14
    - name: "36h"
      min_age_seconds: 129600
      max_age_seconds: 172800
      priority: 12
    - name: "48h"
      min_age_seconds: 172800
      max_age_seconds: 201600
      priority: 10
  mode_overrides:
    STRICT:
      max_honeypot_score: 0.30
      max_rug_score: 0.50
      max_buy_tax_bps: 1500
      include_passed: false
    BALANCED:
      max_honeypot_score: 0.50
      max_rug_score: 0.65
      max_buy_tax_bps: 3000
      include_passed: true
    EXPLORATION:
      max_honeypot_score: 0.60
      max_rug_score: 0.75
      max_buy_tax_bps: 4500
      include_passed: true
    VERY_EXPLORATION:
      max_honeypot_score: 0.75
      max_rug_score: 0.85
      max_buy_tax_bps: 6000
      include_passed: true

# ---------------------------------------------------------------------------
# AI enrichment — Groq API-powered narrative scoring.
# Token read from GROQ_API_KEY env var (never in YAML).
# All calls async, fail-open: NarrativeKnown=false on any error.
# ---------------------------------------------------------------------------
ai_enrichment:
  enabled: true
  endpoint: "https://api.groq.com/openai/v1/chat/completions"
  # Model override priority: AI_ENRICH_MODEL env var > this field > code default (llama-3.3-70b-versatile)
  model: "llama-3.3-70b-versatile"
  timeout_ms: 8000
  max_retries: 1
  max_response_bytes: 4096
  rate_limit_per_min: 30
  max_prompt_chars: 600
  trending_narratives:
    - "AI agents"
    - "DePIN"
    - "gaming"
    - "RWA"
    - "BTCfi"
    - "memecoins"
  narrative_probe:
    enabled: true
    max_description_chars: 300
    min_narrative_score: 3.0
  loss_explainer:
    enabled: true
    min_records_per_batch: 5

# ── Creator Profile Aggregator (Task 8) ───────────────────────────────────────
# Configures the creator_profile_aggregator worker that maintains the
# creator_profiles table for the serial-launcher check (Task 9).
creator_profile:
  # golden_gem_pnl_threshold_pct: wins with PnL above this percentage are stored
  # as "golden" in creator_profiles.golden_gem_tokens instead of "win".
  # 200.0 = 2× return (triple your money). 0 disables golden-gem classification.
  golden_gem_pnl_threshold_pct: 200.0

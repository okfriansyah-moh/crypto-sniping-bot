# Historical Token Market Profiles — Seed Data
# ─────────────────────────────────────────────────────────────────
# 100 representative Solana meme tokens across 10 tiers.
# Used by `cmd/hydrate` to populate the historical_market_profiles table,
# which provides static prior probabilities and calibrated thresholds for
# Layers 1 (DQ), 4 (Probability), and 9 (Position).
#
# data_source values:
#   dexscreener_live — fetched from DEXScreener public API (verified)
#   estimated        — estimated from tier classification + public knowledge
#
# Fields:
#   market_cap_usd    — circulating market cap at fetch time (USD)
#   liquidity_usd     — deepest single-pool liquidity (USD)
#   volume_24h_usd    — 24h volume on best pool (USD)
#   txns_24h_buys     — h24 buy count on best pool
#   txns_24h_sells    — h24 sell count on best pool
#   social_count      — number of known social links (twitter/telegram/discord)
#   has_website       — true if at least one official website
#   pair_age_days     — approximate days since first DEX listing
#   legitimate        — true = known-good community token (not rug/scam)
# ─────────────────────────────────────────────────────────────────


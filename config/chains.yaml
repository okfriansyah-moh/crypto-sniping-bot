chains:
  eth:
    name: "Ethereum Mainnet"
    chain_id: 1
    rpc_endpoints:
      - "${ETH_RPC_1}"
      - "${ETH_RPC_2}"
    ws_endpoints:
      - "${ETH_WS_1}"
    confirmation_depth: 2
    base_tokens:
      - address: "0xC02aaA39b223FE8D0A0e5C4F27eAD9083C756Cc2" # WETH
        symbol: WETH
      - address: "0xdAC17F958D2ee523a2206206994597C13D831ec7" # USDT
        symbol: USDT
      - address: "0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48" # USDC
        symbol: USDC
    factories:
      - address: "0x5C69bEe701ef814a2B6a3EDD4B1652CB9cc5aA6f"
        protocol: uniswap-v2
        market: eth-uniswap-v2
      - address: "0x1F98431c8aD98523631AE4a59f267346ea31F984"
        protocol: uniswap-v3
        market: eth-uniswap-v3
    backoff:
      initial_ms: 500
      max_ms: 30000
      multiplier: 2.0
    poll_interval_ms: 2000
    heartbeat_interval_ms: 10000
    heartbeat_timeout_ms: 30000

  bsc:
    name: "BNB Smart Chain"
    chain_id: 56
    rpc_endpoints:
      - "${BSC_RPC_1}"
      - "${BSC_RPC_2}"
    ws_endpoints:
      - "${BSC_WS_1}"
    confirmation_depth: 3
    base_tokens:
      - address: "0xbb4CdB9CBd36B01bD1cBaEBF2De08d9173bc095c" # WBNB
        symbol: WBNB
      - address: "0x55d398326f99059fF775485246999027B3197955" # USDT
        symbol: USDT
    factories:
      - address: "0xcA143Ce32Fe78f1f7019d7d551a6402fC5350c73"
        protocol: pancakeswap-v2
        market: bsc-pancake-v2
    backoff:
      initial_ms: 500
      max_ms: 30000
      multiplier: 2.0
    poll_interval_ms: 2000
    heartbeat_interval_ms: 10000
    heartbeat_timeout_ms: 30000

# Ingestion backoff and polling defaults (applied per-chain if not overridden).
# To override for a specific chain, add these keys under chains.<chain>:
#   backoff: { initial_ms: 500, max_ms: 30000, multiplier: 2.0 }
#   poll_interval_ms: 2000
#   heartbeat_interval_ms: 10000
#   heartbeat_timeout_ms: 30000

# Phase 7: Solana ingestion configuration.
solana:
  chain_id: "solana"
  confirmation_commitment: "confirmed"
  blockhash_refresh_ms: 2000
  ws_heartbeat_timeout_ms: 20000
  gap_recovery_max_slots: 1000
  publish_buffer_size: 256
  preferred_region: "us-east"
  providers_required: 1
  rpc:
    - url: "${SOLANA_RPC_HTTP_1}"
      priority: 1
      kind: http
      region: us-east
    - url: "${SOLANA_WS_1}"
      priority: 1
      kind: ws
      region: us-east
    - url: "${SOLANA_RPC_HTTP_2}"
      priority: 2
      kind: http
      region: us-east
    - url: "${SOLANA_WS_2}"
      priority: 2
      kind: ws
      region: us-east
  programs:
    - program_id: "675kPX9MHTjS2zt1qfr1NYHuzeLXfQM9H24wFSUt1Mp8"
      family: raydium-v4
    - program_id: "6EF8rrecthR5Dkzon8Nwu78hRvfCKubJ14M5uBEwF6P"
      family: pumpfun
  # getTransaction HTTP rate cap — must be ≤ RPC provider account limit.
  # QuickNode free tier = 15 req/s; lowered to 2 to stay within daily quota.
  # At 2 req/s the daily usage is ~172k calls — well under free-tier daily caps.
  get_transaction_rps: 2
  # rate_limit_backoff_ms: how long to suppress getTransaction calls after a
  # -32003 daily-quota error. Default 60s; increase if quota resets take longer.
  rate_limit_backoff_ms: 60000
  ingestion_backoff:
    initial_ms: 200
    max_ms: 30000
    multiplier: 2.0
  health:
    score_refresh_interval_ms: 5000
    latency_normalizer_ms: 1000
    latency_failover_threshold_ms: 3000
    error_rate_failover_threshold: 0.1
    consecutive_ws_failures_threshold: 3
    circuit_open_cooldown_ms: 30000
